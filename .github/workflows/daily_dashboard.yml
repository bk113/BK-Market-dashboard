name: Daily Market Dashboard
on:
  schedule:
    - cron: '0 23 * * 0-4'
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install yfinance pandas numpy matplotlib pytz schedule python-pptx
      - name: Generate dashboard
        run: python bk_market_dashboard.py --html
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --staged --quiet || git commit -m "chore: daily update $(date -u +'%Y-%m-%d')"
          git push